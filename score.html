<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Scoreboard Lomba</title>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-6">
      <nav class="fixed flex top-0 left-0 right-0 bg-blue-500 px-6 py-4 justify-between items-center">
      <h2 class="text-2xl font-bold text-white">Nexdy Experiment</h2>
      <button type="submit" class="text-white"><span class="material-symbols-outlined">
              menu
          </span></button>
  </nav>
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-extrabold text-center mb-8 text-slate-900">
            PAPAN SKOR
        </h1>

        <div class="bg-white overflow-scroll rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.05)] border border-slate-200">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-500 uppercase text-xs tracking-wider font-semibold">
                        <th class="py-5 px-6">Rank</th>
                        <th class="py-5 px-6">Nama Peserta</th>
                        <th class="py-5 px-6">Gugus</th>
                        <th class="py-5 px-6 text-right">Score</th>
                    </tr>
                </thead>
                <tbody class="text-slate-700 text-base">
                    <tr class="border-b border-slate-100 hover:bg-blue-50 transition-colors">
                        <td class="py-5 px-6 font-bold text-amber-500">#1</td>
                        <td class="py-5 px-6 font-medium">Budi Santoso</td>
                        <td class="py-5 px-6">Gugus Merpati</td>
                        <td class="py-5 px-6 text-right font-mono font-bold text-blue-600">1,250</td>
                    </tr>
                    <tr class="border-b border-slate-100 hover:bg-blue-50 transition-colors">
                        <td class="py-5 px-6 font-bold text-slate-500">#2</td>
                        <td class="py-5 px-6 font-medium">Siti Aminah</td>
                        <td class="py-5 px-6">Gugus Elang</td>
                        <td class="py-5 px-6 text-right font-mono font-bold text-blue-600">1,120</td>
                    </tr>
                    <tr class="border-b border-slate-100 hover:bg-blue-50 transition-colors">
                        <td class="py-5 px-6 font-bold text-orange-400">#3</td>
                        <td class="py-5 px-6 font-medium">Andi Wijaya</td>
                        <td class="py-5 px-6">Gugus Garuda</td>
                        <td class="py-5 px-6 text-right font-mono font-bold text-blue-600">980</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
