<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap tap Game dengan Timer - Tailwind CSS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'tap-pulse': 'tapPulse 0.3s ease-out',
                        'score-up': 'scoreUp 0.2s ease-out',
                    },
                    keyframes: {
                        tapPulse: {
                            '0%': { transform: 'scale(1)', boxShadow: '0 0 0 0px rgba(59, 130, 246, 0.7)' },
                            '50%': { transform: 'scale(1.05)', boxShadow: '0 0 0 15px rgba(59, 130, 246, 0)' },
                            '100%': { transform: 'scale(1)', boxShadow: '0 0 0 0px rgba(59, 130, 246, 0)' },
                        },
                        scoreUp: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.1)', color: '#22c55e' },
                            '100%': { transform: 'scale(1)', color: 'inherit' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="">

  <nav class="fixed flex top-0 left-0 right-0 bg-blue-500 px-6 py-4 justify-between items-center">
  <h2 class="text-2xl font-bold text-white">Nexdy Experiment</h2>
  <button type="submit" class="text-white"><span class="material-symbols-outlined">
  menu
</span></button>
</nav>
<content class="flex flex-col items-center justify-center h-screen bg-gray-50 p-4 font-sans select-none">
    <div id="game-screen" class="w-full max-w-lg flex flex-col items-center">
        <div class="w-full flex justify-between items-center mb-6 px-2">
            <h2 id="teks-poin" class="text-2xl font-bold text-gray-800 transition-transform duration-100">
                Poin: 0
            </h2>
            <div class="bg-amber-100 border border-amber-300 text-amber-800 font-bold px-4 py-1.5 rounded-full text-lg">
                ⏱️ Waktu: <span id="teks-timer">30</span>s
            </div>
        </div>

        <p id="petunjuk" class="text-sm text-gray-500 mb-2 animate-bounce">
            Klik kotak di bawah untuk mulai bermain!
        </p>

        <div id="area-tap" class="w-full h-96 border-2 border-dashed border-blue-500 rounded-xl flex justify-center items-center text-2xl font-semibold text-blue-600 cursor-pointer transition-colors duration-100 hover:bg-blue-50 hover:border-blue-600 active:bg-blue-100">
            Tap disini!
        </div>
    </div>


    <div id="result-screen" class="hidden w-full max-w-md bg-white border border-gray-200 rounded-2xl p-8 shadow-xl text-center flex flex-col items-center animate-fade-in">
        <h1 class="text-4xl font-extrabold text-red-500 mb-2">Waktu Habis! </h1>
        <p class="text-gray-500 mb-6">Permainan selesai. Kerja bagus!</p>
        
        <div class="bg-gray-50 border border-gray-100 rounded-xl p-6 w-full mb-8">
            <span class="text-gray-400 block text-sm uppercase tracking-wider font-semibold">Skor Akhir Anda</span>
            <span id="skor-akhir" class="text-6xl font-black text-blue-600 block mt-2">0</span>
        </div>

        <button id="btn-restart" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-blue-200 transition-all text-lg">
            🔄 Main Lagi
        </button>
    </div>

</content>

    <script>
        // Ambil elemen HTML
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const areaTap = document.getElementById('area-tap');
        const teksPoin = document.getElementById('teks-poin');
        const teksTimer = document.getElementById('teks-timer');
        const petunjuk = document.getElementById('petunjuk');
        const skorAkhir = document.getElementById('skor-akhir');
        const btnRestart = document.getElementById('btn-restart');

        // Variabel State Game
        let poin = 0;
        let waktuSisa = 30;
        let timerId = null;
        let gameBerjalan = false;

        // Fungsi untuk memulai timer (hanya dipicu saat klik pertama)
        function mulaiTimer() {
            gameBerjalan = true;
            petunjuk.classList.add('hidden'); // Sembunyikan petunjuk "Klik untuk mulai"

            timerId = setInterval(function() {
                waktuSisa--;
                teksTimer.innerText = waktuSisa;

                // Ketika waktu habis
                if (waktuSisa <= 0) {
                    clearInterval(timerId); // Hentikan hitung mundur
                    gameBerjalan = false;
                    gameOver();
                }
            }, 1000); // Berjalan setiap 1 detik (1000 ms)
        }

        // Fungsi saat permainan selesai
        function gameOver() {
            // Tampilkan skor di halaman hasil
            skorAkhir.innerText = poin;

            // Sembunyikan layar game, munculkan layar hasil
            gameScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
        }

        // Event saat kotak diklik
        areaTap.addEventListener('click', function() {
            // Jika ini klik pertama, jalankan timer
            if (!gameBerjalan && waktuSisa === 30) {
                mulaiTimer();
            }

            // Tambah poin dan ganti teks di layar
            poin++; 
            teksPoin.innerText = 'Poin: ' + poin;

            // --- Efek Animasi Klik ---
            areaTap.classList.remove('animate-tap-pulse');
            teksPoin.classList.remove('animate-score-up');
            void areaTap.offsetWidth; 
            void teksPoin.offsetWidth;
            areaTap.classList.add('animate-tap-pulse');
            teksPoin.classList.add('animate-score-up');
        });

        // Event saat tombol "Main Lagi" diklik
        btnRestart.addEventListener('click', function() {
            // Reset semua variabel ke kondisi awal
            poin = 0;
            waktuSisa = 30;
            gameBerjalan = false;
            timerId = null;

            // Kembalikan tampilan teks awal
            teksPoin.innerText = 'Poin: 0';
            teksTimer.innerText = '30';
            petunjuk.classList.remove('hidden');

            // Tukar posisi layar (sembunyikan hasil, munculkan game)
            resultScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
        });
    </script>

</body>
</html>
